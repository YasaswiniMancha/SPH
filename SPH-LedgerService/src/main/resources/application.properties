# ===============================
# APPLICATION
# ===============================
spring.application.name=SPH-TransactionHistory
server.port=8084

# ===============================
# DATASOURCE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/transaction_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.maximum-pool-size=150
spring.datasource.hikari.minimum-idle=30
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# REDIS
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=1000ms

spring.data.redis.lettuce.pool.max-active=200
spring.data.redis.lettuce.pool.max-idle=100
spring.data.redis.lettuce.pool.min-idle=50

# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.producer.acks=1
spring.kafka.producer.batch-size=32768
spring.kafka.producer.linger-ms=20
spring.kafka.producer.compression-type=snappy
spring.kafka.consumer.group-id=transaction-service-group
spring.kafka.consumer.max-poll-records=500

# ===============================
# CACHE
# ===============================
spring.cache.type=redis
cache.transaction.ttl-minutes=30
cache.analytics.ttl-minutes=60

# ===============================
# SERVER / TOMCAT
# ===============================
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=50
server.tomcat.max-connections=15000
server.compression.enabled=true
server.compression.min-response-size=512

# ===============================
# ACTUATOR / METRICS
# ===============================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.tags.application=SPH-TransactionHistory

# ===============================
# RESILIENCE4J
# ===============================
resilience4j.circuitbreaker.instances.transactionCB.slidingWindowSize=100
resilience4j.circuitbreaker.instances.transactionCB.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.transactionCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.transactionCB.waitDurationInOpenState=5s

resilience4j.retry.instances.transactionRetry.maxAttempts=3
resilience4j.retry.instances.transactionRetry.waitDuration=100ms

# ===============================
# EXTERNAL SERVICES
# ===============================
wallet-service.url=http://localhost:8082
merchant-service.url=http://localhost:8083
auth-service.url=http://localhost:8080

# ===============================
# FEIGN
# ===============================
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=10000


# ===============================
# MONGODB (NEW - Analytics)
# ===============================
spring.data.mongodb.uri=mongodb://${MONGO_USER:admin}:${MONGO_PASSWORD}@${MONGO_HOST:localhost}:27017/sph_analytics
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.connection-pool-size=200

# Enable MongoDB connection pooling for high throughput
spring.data.mongodb.connection-pool.max-size=200
spring.data.mongodb.connection-pool.min-size=50