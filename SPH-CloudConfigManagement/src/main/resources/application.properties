# ===============================
# APPLICATION
# ===============================
spring.application.name=SPH-CloudConfigServer
server.port=8888
server.servlet.context-path=/config

# ===============================
# DATASOURCE (RDS PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://${RDS_HOST:localhost}:5432/config_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.fetch_size=100

# ===============================
# REDIS CACHE
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=redis
spring.cache.redis.time-to-live=600000ms

# ===============================
# SPRING CLOUD CONFIG SERVER
# ===============================
spring.cloud.config.server.native.search-locations=classpath:/config

# ===============================
# AWS CONFIGURATION
# ===============================
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${AWS_S3_BUCKET:smartpayhub-configs}
aws.s3.prefix=configurations/
aws.cloudwatch.namespace=SmartPayHub/ConfigService
aws.lambda.function.name=${AWS_LAMBDA_FUNCTION:config-update-notifier}
aws.ec2.tag.environment=${ENVIRONMENT:dev}
aws.rds.instance-id=${RDS_INSTANCE_ID:smartpayhub-db}

# ===============================
# ACTUATOR / METRICS
# ===============================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.tags.application=SPH-CloudConfigServer

# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.producer.compression-type=snappy
spring.kafka.producer.retries=3
spring.kafka.consumer.group-id=config-service-group

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.cloudconfig.smart.pay.hub.sph=DEBUG


# ===============================
# RESILIENCE4J CIRCUIT BREAKER
# ===============================
resilience4j.circuitbreaker.instances.configServiceCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.configServiceCB.slidingWindowSize=50
resilience4j.circuitbreaker.instances.configServiceCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.configServiceCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.configServiceCB.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.configServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.configServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.configServiceCB.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.configServiceCB.slowCallDurationThreshold=2s

# ===============================
# RESILIENCE4J RETRY
# ===============================
resilience4j.retry.instances.configServiceRetry.maxAttempts=3
resilience4j.retry.instances.configServiceRetry.waitDuration=100ms