# ===============================
# APPLICATION
# ===============================
spring.application.name=SPH-MerchantService
server.port=8082
server.servlet.context-path=/merchant

# ===============================
# DATASOURCE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/merchant_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20

# ===============================
# REDIS CACHE
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=redis
spring.cache.redis.time-to-live=300000ms

# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.producer.compression-type=snappy
spring.kafka.consumer.group-id=merchant-service-group

# ===============================
# ACTUATOR / METRICS
# ===============================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.tags.application=SPH-MerchantService

# ===============================
# RESILIENCE4J
# ===============================
resilience4j.circuitbreaker.instances.merchantServiceCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.merchantServiceCB.slidingWindowSize=50
resilience4j.circuitbreaker.instances.merchantServiceCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.merchantServiceCB.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.merchantServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.merchantServiceCB.waitDurationInOpenState=10s

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.merchant.smart.pay.hub.sph=DEBUG