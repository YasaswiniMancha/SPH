spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

---

spring:
  profiles: dev
  application:
    name: sph-merchant-service
  server:
    port: ${SERVER_PORT:8084}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sph_merchant}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

cache:
  type: redis

redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.merchant.smart.pay.hub.sph: DEBUG

# Use pessimistic locking where business-critical
app:
  use-pessimistic-locking: true

---

spring:
  profiles: prod
  application:
    name: sph-merchant-service
  server:
    port: ${SERVER_PORT:8084}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

cache:
  type: redis

redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    com.merchant.smart.pay.hub.sph: INFO

