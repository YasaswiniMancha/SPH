spring.application.name=SPH-ApiGateway
server.port=8080

# Downstream service base URLs (replace with ECS/EKS/private DNS later)
services.wallet.base-url=${WALLET_SERVICE_URL:http://localhost:8083}
services.transaction.base-url=${TRANSACTION_SERVICE_URL:http://localhost:8086}
services.auth.base-url=${AUTH_SERVICE_URL:http://localhost:8081}

# Gateway routes for wallet-focused flows
spring.cloud.gateway.mvc.routes[0].id=wallet-service-route
spring.cloud.gateway.mvc.routes[0].uri=${services.wallet.base-url}
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/v1/wallet/**
spring.cloud.gateway.mvc.routes[0].filters[0]=StripPrefix=0

spring.cloud.gateway.mvc.routes[1].id=wallet-transactions-route
spring.cloud.gateway.mvc.routes[1].uri=${services.transaction.base-url}
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/v1/wallet-transactions/**
spring.cloud.gateway.mvc.routes[1].filters[0]=StripPrefix=0

spring.cloud.gateway.mvc.routes[2].id=auth-route
spring.cloud.gateway.mvc.routes[2].uri=${services.auth.base-url}
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/v1/auth/**
spring.cloud.gateway.mvc.routes[2].filters[0]=StripPrefix=0

# Basic hardening and operations
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
spring.cloud.gateway.server.webmvc.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.server.webmvc.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.server.webmvc.globalcors.cors-configurations.[/**].allowedHeaders=*

# Security (set true in non-local environments)
security.jwt.enabled=${SECURITY_JWT_ENABLED:false}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:}
# Expected OAuth2 scopes when JWT is enabled:
# wallet.read, wallet.write, txn.read, txn.write
