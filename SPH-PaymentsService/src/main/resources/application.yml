spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

---

spring:
  profiles: dev
  application:
    name: sph-payments-service
  server:
    port: ${SERVER_PORT:8082}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sph_payments}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

resilience4j:
  retry:
    instances:
      paymentPublishRetry:
        maxAttempts: 3
        waitDuration: 1s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    com.payments.smart.pay.hub.sph: DEBUG

---

spring:
  profiles: prod
  application:
    name: sph-payments-service
  server:
    port: ${SERVER_PORT:8082}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

resilience4j:
  retry:
    instances:
      paymentPublishRetry:
        maxAttempts: 5
        waitDuration: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    com.payments.smart.pay.hub.sph: INFO

