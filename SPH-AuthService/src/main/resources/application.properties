# ===============================
# DATASOURCE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/auth_db
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.maximum-pool-size=200
spring.datasource.hikari.minimum-idle=50
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.leak-detection-threshold=30000

# PostgreSQL does NOT use these MySQL properties
# spring.datasource.hikari.data-source-properties.useSSL=false
# spring.datasource.hikari.data-source-properties.allowPublicKeyRetrieval=true

# Recommended PostgreSQL SSL config
spring.datasource.hikari.data-source-properties.ssl=false


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# ===============================
# REDIS
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=1000ms
spring.data.redis.ssl.enabled=false

spring.data.redis.lettuce.pool.max-active=200
spring.data.redis.lettuce.pool.max-idle=100
spring.data.redis.lettuce.pool.min-idle=50
spring.data.redis.lettuce.pool.max-wait=1000ms


# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}

spring.kafka.producer.acks=1
spring.kafka.producer.batch-size=32768
spring.kafka.producer.linger-ms=20
spring.kafka.producer.compression-type=snappy
spring.kafka.producer.buffer-memory=67108864
spring.kafka.producer.retries=3

spring.kafka.consumer.group-id=auth-service-group
spring.kafka.consumer.max-poll-records=1000
spring.kafka.consumer.fetch-min-bytes=10240
spring.kafka.consumer.fetch-max-wait-ms=500


# ===============================
# CACHE
# ===============================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000ms
spring.cache.redis.cache-null-values=false


# ===============================
# SERVER / TOMCAT
# ===============================
server.port=8080
server.servlet.context-path=/

server.tomcat.threads.max=500
server.tomcat.threads.min-spare=100
server.tomcat.max-connections=20000
server.tomcat.accept-count=500
server.connection-timeout=5000ms
server.tomcat.keep-alive-timeout=60000ms
server.tomcat.max-keep-alive-requests=100

server.compression.enabled=true
server.compression.min-response-size=512B


# ===============================
# ACTUATOR / METRICS
# ===============================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.tags.application=SPH-AuthService

management.metrics.distribution.percentiles-histogram.auth.register=true
management.metrics.distribution.percentiles-histogram.auth.login=true
management.metrics.distribution.percentiles-histogram.auth.logout=true
management.metrics.distribution.percentiles-histogram.auth.token.validate=true


# ===============================
# RESILIENCE4J CIRCUIT BREAKER
# ===============================
resilience4j.circuitbreaker.instances.authServiceCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.authServiceCB.slidingWindowSize=100
resilience4j.circuitbreaker.instances.authServiceCB.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.authServiceCB.permittedNumberOfCallsInHalfOpenState=5
resilience4j.circuitbreaker.instances.authServiceCB.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.authServiceCB.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.authServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.authServiceCB.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.authServiceCB.slowCallDurationThreshold=2s


# ===============================
# RESILIENCE4J RETRY
# ===============================
resilience4j.retry.instances.authServiceRetry.maxAttempts=3
resilience4j.retry.instances.authServiceRetry.waitDuration=100ms
resilience4j.retry.instances.authServiceRetry.retryExceptions[0]=java.sql.SQLRecoverableException
resilience4j.retry.instances.authServiceRetry.retryExceptions[1]=org.springframework.dao.TransientDataAccessException


# ===============================
# RESILIENCE4J RATE LIMITER
# ===============================
resilience4j.ratelimiter.instances.authRateLimiter.registerHealthIndicator=false
resilience4j.ratelimiter.instances.authRateLimiter.limitRefreshPeriod=1s
resilience4j.ratelimiter.instances.authRateLimiter.limitForPeriod=5000
resilience4j.ratelimiter.instances.authRateLimiter.timeoutDuration=100ms


# ===============================
# JWT
# ===============================
auth.jwt.secret=${JWT_SECRET}
auth.jwt.access-token-expiry-ms=900000
auth.jwt.refresh-token-expiry-ms=604800000
auth.jwt.issuer=SmartPayHub


# ===============================
# CUSTOM CACHE
# ===============================
auth.cache.user.ttl-minutes=10
auth.cache.token.ttl-minutes=15